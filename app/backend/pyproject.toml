# ── pytest ────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode  = "auto"           # all async tests run automatically
asyncio_default_fixture_loop_scope = "session"   # suppress deprecation warning
pythonpath    = ["."]            # makes `from core.x import ...` work in tests
testpaths     = ["tests"]
markers = [
    "unit:        unit tests — no external services required",
    "integration: integration tests — requires postgres + qdrant",
    "eval:        evaluation tests — requires qdrant + real embedder; add RUN_EVAL=true for LLM judge",
]
# Short traceback by default; override with -v --tb=long when debugging
addopts = "--tb=short -q"

# ── ruff (linter + formatter) ─────────────────────────────────────────────────
[tool.ruff]
line-length    = 100
target-version = "py312"
exclude        = ["__pycache__", ".venv", "tests/"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in default arguments (FastAPI pattern)
    "B904",  # exception chaining (stylistic choice)
]

[tool.ruff.lint.isort]
known-first-party = ["core", "agents", "tools", "routers", "utils"]

# ── coverage ──────────────────────────────────────────────────────────────────
[tool.coverage.run]
source   = ["."]
omit     = ["tests/*", "**/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
