name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  BACKEND_DIR: app/backend

# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check ${{ env.BACKEND_DIR }}/

      - name: Ruff format check
        run: ruff format --check ${{ env.BACKEND_DIR }}/

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (no services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r ${{ env.BACKEND_DIR }}/requirements.txt \
                      -r ${{ env.BACKEND_DIR }}/requirements-dev.txt

      - name: Run unit tests
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          ANTHROPIC_API_KEY: test-not-real
          DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@localhost:5432/ragdb
          QDRANT_URL: http://localhost:6333
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=. --cov-omit="tests/*" \
            --cov-report=term-missing \
            -m "not integration"

  # ── 3. Integration tests ───────────────────────────────────────────────────
  integration-tests:
    name: Integration tests (postgres + qdrant)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ragdb
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raguser -d ragdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 15s

      qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':>/dev/tcp/localhost/6333' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r ${{ env.BACKEND_DIR }}/requirements.txt \
                      -r ${{ env.BACKEND_DIR }}/requirements-dev.txt

      - name: Run integration tests
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          ANTHROPIC_API_KEY: test-not-real-ci
          DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@localhost:5432/ragdb
          QDRANT_URL: http://localhost:6333
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY: ragapp
          S3_SECRET_KEY: ragapp123
        run: pytest tests/integration/ -v --tb=short -m integration

  # ── 4. Docker build check ─────────────────────────────────────────────────
  build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          file: app/backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: app/frontend
          file: app/frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
